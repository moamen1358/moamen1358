<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 280" role="img" aria-label="Moamen Ghareeb, AI Engineer">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <text x="750" y="135"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="104" font-weight="800"
        fill="url(#nameGrad)" text-anchor="middle"
        letter-spacing="-2">Moamen Ghareeb</text>

  <line x1="500" y1="172" x2="1000" y2="172"
        stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>

  <text x="750" y="215"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
        font-size="22" font-weight="500"
        fill="#7C3AED" text-anchor="middle"
        letter-spacing="14">AI ENGINEER</text>
</svg>
