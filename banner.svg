<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 320" role="img" aria-label="Moamen Ghareeb — AI Engineer in Cairo, Egypt">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="35%" stop-color="#1E1B4B"/>
      <stop offset="70%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1" fill="#FFFFFF" opacity="0.18"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <rect width="1500" height="320" rx="20" fill="url(#bg)"/>
  <rect width="1500" height="320" rx="20" fill="url(#dots)"/>
  <rect width="1500" height="320" rx="20" fill="url(#glow1)"/>
  <rect width="1500" height="320" rx="20" fill="url(#glow2)"/>

  <g opacity="0.7">
    <circle cx="120" cy="80" r="2.5" fill="#FFFFFF"/>
    <circle cx="180" cy="120" r="1.5" fill="#FFFFFF"/>
    <circle cx="90" cy="160" r="1.8" fill="#FFFFFF"/>
    <circle cx="220" cy="60" r="1.2" fill="#FFFFFF"/>
    <circle cx="160" cy="200" r="1.6" fill="#FFFFFF"/>

    <circle cx="1380" cy="100" r="2.5" fill="#FFFFFF"/>
    <circle cx="1320" cy="140" r="1.5" fill="#FFFFFF"/>
    <circle cx="1410" cy="180" r="1.8" fill="#FFFFFF"/>
    <circle cx="1280" cy="80" r="1.2" fill="#FFFFFF"/>
    <circle cx="1340" cy="220" r="1.6" fill="#FFFFFF"/>
  </g>

  <g stroke="#FFFFFF" stroke-width="1" opacity="0.18" fill="none">
    <line x1="120" y1="80" x2="180" y2="120"/>
    <line x1="180" y1="120" x2="90" y2="160"/>
    <line x1="180" y1="120" x2="220" y2="60"/>
    <line x1="90" y1="160" x2="160" y2="200"/>

    <line x1="1380" y1="100" x2="1320" y2="140"/>
    <line x1="1320" y1="140" x2="1410" y2="180"/>
    <line x1="1320" y1="140" x2="1280" y2="80"/>
    <line x1="1410" y1="180" x2="1340" y2="220"/>
  </g>

  <text x="750" y="155"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="76" font-weight="800"
        fill="#FFFFFF" text-anchor="middle"
        letter-spacing="1">Moamen Ghareeb</text>

  <text x="750" y="208"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
        font-size="20" font-weight="500"
        fill="#E0E7FF" text-anchor="middle"
        letter-spacing="6">AI ENGINEER &#183; CAIRO, EGYPT</text>

  <line x1="700" y1="240" x2="800" y2="240" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>

  <text x="750" y="275"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400"
        fill="#C7D2FE" text-anchor="middle"
        letter-spacing="2"
        opacity="0.85">PRODUCTION AGENTIC SYSTEMS &#8226; OPEN SOURCE</text>
</svg>
