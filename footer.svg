      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="35%" stop-color="#6366F1"/>
      <stop offset="70%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <pattern id="dots2" width="48" height="48" patternUnits="userSpaceOnUse">
