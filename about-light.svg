<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 170" role="img" aria-label="About">
  <!-- shadow card -->
  <rect x="50" y="25" width="920" height="130" rx="14" ry="14"
        fill="#C7D2FE"/>
  <!-- main card -->
  <rect x="40" y="15" width="920" height="130" rx="14" ry="14"
        fill="#EEF2FF" stroke="#4338CA" stroke-width="2"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
